  <script>
    (function() {
      (function setTotalFromStorage() {
        var numEl = document.querySelector('.checkout-header-card__number');
        var valueEl = document.querySelector('.checkout-header-card__value');
        if (!numEl) return;
        var total = 0;
        try {
          var raw = localStorage.getItem('animacase_checkout_data');
          if (raw) {
            var data = JSON.parse(raw);
            if (data && typeof data.total === 'number') total = data.total;
          }
        } catch (_) {}
        var formatted = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(total);
        numEl.textContent = formatted;
        if (valueEl) valueEl.setAttribute('aria-label', 'R$ ' + formatted);
      })();

      document.querySelectorAll('.card__item--disabled').forEach(function(el) {
        el.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          var msg = el.getAttribute('data-disabled-message') || 'Essa loja desabilitou essa opção de recebimento.';
          alert(msg);
        });
      });

      (function interceptMpLinks() {
        var mpPages = ['mercado-pago.html', 'checkout-pix-review.html', 'checkout-pix-gerado.html', 'checkout-pix-aprovado.html', 'checkout-boleto.html'];
        document.querySelectorAll('a[href]').forEach(function(a) {
          var href = (a.getAttribute('href') || '').split('?')[0].replace(/^.*\//, '');
          if (mpPages.indexOf(href) !== -1 && href !== 'mercado-pago.html') {
            a.addEventListener('click', function(e) {
              e.preventDefault();
              var modal = document.getElementById('checkout-loading-modal');
              if (modal) {
                modal.classList.remove('checkout-novo__loading-modal--hidden');
                modal.style.display = 'flex';
                modal.setAttribute('aria-busy', 'true');
              }
              setTimeout(function() { window.location.href = a.getAttribute('href'); }, 850);
            });
          }
        });
      })();

      (function loadingModal() {
        var modal = document.getElementById('checkout-loading-modal');
        if (!modal) return;
        setTimeout(function() {
          modal.classList.add('checkout-novo__loading-modal--hidden');
          modal.setAttribute('aria-busy', 'false');
          setTimeout(function() {
            modal.style.display = 'none';
          }, 350);
        }, 850);
      })();
    })();
  </script>
