  <script>
    (function() {
      var operationId = "kirkland-" + (Date.now ? Date.now() : Math.random().toString(36).slice(2));
      try {
        var tx = sessionStorage.getItem('animacase_pix_transaction_id');
        if (tx) operationId = tx;
      } catch (_) {}
      var amountText = "Você pagou no Pix";
      var amount = 0;
      try {
        var stored = sessionStorage.getItem('animacase_pix_amount');
        if (stored) amount = parseFloat(String(stored).replace(',', '.')) || 0;
      } catch (_) {}
      var amountValue = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(amount);

      document.getElementById('operation-id').textContent = "Operação #" + operationId;
      document.getElementById('amount-text').textContent = amountText;
      document.getElementById('approved-amount').textContent = amountValue;

      (function loadingModal() {
        var modal = document.getElementById('checkout-loading-modal');
        if (!modal) return;
        setTimeout(function() {
          modal.classList.add('checkout-novo__loading-modal--hidden');
          modal.setAttribute('aria-busy', 'false');
          setTimeout(function() { modal.style.display = 'none'; }, 350);
        }, 850);
      })();

      (function interceptMpLinks() {
        var mpPages = ['mercado-pago.html', 'checkout-pix-review.html', 'checkout-pix-gerado.html', 'checkout-pix-aprovado.html', 'checkout-boleto.html'];
        document.querySelectorAll('a[href]').forEach(function(a) {
          var href = (a.getAttribute('href') || '').split('?')[0].replace(/^.*\//, '');
          if (mpPages.indexOf(href) !== -1 && href !== 'checkout-pix-aprovado.html') {
            a.addEventListener('click', function(e) {
              e.preventDefault();
              var modal = document.getElementById('checkout-loading-modal');
              if (modal) {
                modal.classList.remove('checkout-novo__loading-modal--hidden');
                modal.style.display = 'flex';
                modal.setAttribute('aria-busy', 'true');
              }
              setTimeout(function() { window.location.href = a.getAttribute('href'); }, 850);
            });
          }
        });
      })();
    })();
  </script>
