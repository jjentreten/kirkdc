<body class="checkout-novo checkout-novo--boleto" data-theme="mp">

                    <option value="CPF">CPF</option>

                </div>
                <span class="checkout-novo__boleto-error" id="boleto-doc-error"></span>
              </div>

              <div class="checkout-novo__boleto-field">
                <label class="checkout-novo__boleto-label" for="boleto-nome">Nome</label>
                <input type="text" class="checkout-novo__boleto-input" id="boleto-nome" placeholder="Ex.: Maria Clara" autocomplete="given-name">
                <span class="checkout-novo__boleto-error" id="boleto-nome-error"></span>

              <div class="checkout-novo__boleto-field">

                <input type="text" class="checkout-novo__boleto-input" id="boleto-sobrenome" placeholder="Ex.: Lopes Soares" autocomplete="family-name">
                <span class="checkout-novo__boleto-error" id="boleto-sobrenome-error"></span>
              </div>

              <div class="checkout-novo__boleto-field">
                <label class="checkout-novo__boleto-label" for="boleto-email">E-mail</label>
                <input type="email" class="checkout-novo__boleto-input checkout-novo__boleto-input--disabled" id="boleto-email" value="eva******@gmail****" readonly disabled aria-readonly="true">
              </div>
            </div>

            <div class="checkout-novo__boleto-actions">
              <button type="button" class="checkout-novo__boleto-btn checkout-novo__boleto-btn--primary" id="boleto-continuar-1">Continuar</button>

            </div>
          </div>

            <span class="checkout-novo__boleto-step-label">PASSO 2 DE 2</span>
            <h1 class="checkout-novo__boleto-title">Informe o endereço de cobrança</h1>

              <div class="checkout-novo__boleto-field">
                <label class="checkout-novo__boleto-label" for="boleto-cidade">Cidade</label>
                <input type="text" class="checkout-novo__boleto-input" id="boleto-cidade" placeholder="Ex.: Florianópolis" autocomplete="address-level2">
              </div>

              <div class="checkout-novo__boleto-field">
                <label class="checkout-novo__boleto-label" for="boleto-bairro">Bairro</label>

  <script>
    (function() {
      (function setTotalFromStorage() {
        var numEl = document.querySelector('.checkout-header-card__number');
        var valueEl = document.querySelector('.checkout-header-card__value');
        if (!numEl) return;
        var total = 0;
        try {
          var raw = localStorage.getItem('animacase_checkout_data');
          if (raw) {
            var data = JSON.parse(raw);
            if (data && typeof data.total === 'number') total = data.total;
          }
        } catch (_) {}
        var formatted = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(total);
        numEl.textContent = formatted;
        if (valueEl) valueEl.setAttribute('aria-label', 'R$ ' + formatted);
      })();

      (function setEmailFromStorage() {
        var el = document.getElementById('boleto-email');
        if (!el) return;
        var email = '';
        try { email = localStorage.getItem('animacase_checkout_email') || ''; } catch (_) {}
        if (email && email.indexOf('@') > 0) {
          var at = email.indexOf('@');
          var local = email.substring(0, at);
          var rest = email.substring(at + 1);
          var dot = rest.lastIndexOf('.');
          var domain = dot >= 0 ? rest.substring(0, dot) : rest;
          var localShow = local.length >= 3 ? local.substring(0, 3) : (local || '***');
          el.value = localShow + '******@' + domain + '****';
        }
      })();

      (function loadingModal() {
        var modal = document.getElementById('checkout-loading-modal');
        if (!modal) return;
        setTimeout(function() {
          modal.classList.add('checkout-novo__loading-modal--hidden');
          modal.setAttribute('aria-busy', 'false');
          setTimeout(function() { modal.style.display = 'none'; }, 350);
        }, 850);
      })();

      (function interceptMpLinks() {
        var mpPages = ['mercado-pago.html', 'checkout-pix-review.html', 'checkout-pix-gerado.html', 'checkout-pix-aprovado.html', 'checkout-boleto.html'];
        document.querySelectorAll('a[href]').forEach(function(a) {
          var href = (a.getAttribute('href') || '').split('?')[0].replace(/^.*\//, '');
          if (mpPages.indexOf(href) !== -1 && href !== 'checkout-boleto.html') {
            a.addEventListener('click', function(e) {
              e.preventDefault();
              var modal = document.getElementById('checkout-loading-modal');
              if (modal) {
                modal.classList.remove('checkout-novo__loading-modal--hidden');
                modal.style.display = 'flex';
                modal.setAttribute('aria-busy', 'true');
              }
              setTimeout(function() { window.location.href = a.getAttribute('href'); }, 850);
            });
          }
        });
      })();

      var currentStep = 1;

      function showStep(step) {
        currentStep = step;
        document.getElementById('boleto-step-1').classList.toggle('checkout-novo__boleto-step--hidden', step !== 1);
        document.getElementById('boleto-step-2').classList.toggle('checkout-novo__boleto-step--hidden', step !== 2);
      }

      function showError(fieldId, msg) {
        var el = document.getElementById(fieldId);
        if (el) el.textContent = msg || '';
      }

      function validateStep1() {
        var doc = (document.getElementById('boleto-documento').value || '').trim();
        var nome = (document.getElementById('boleto-nome').value || '').trim();
        var sobrenome = (document.getElementById('boleto-sobrenome').value || '').trim();

        showError('boleto-doc-error', '');
        showError('boleto-nome-error', '');
        showError('boleto-sobrenome-error', '');

        var ok = true;
        if (!doc) { showError('boleto-doc-error', 'Informe o documento.'); ok = false; }
        if (!nome) { showError('boleto-nome-error', 'Informe o nome.'); ok = false; }
        if (!sobrenome) { showError('boleto-sobrenome-error', 'Informe o sobrenome.'); ok = false; }
        return ok;
      }

      document.getElementById('boleto-continuar-1').addEventListener('click', function() {
        if (!validateStep1()) return;
        var modal = document.getElementById('checkout-loading-modal');
        modal.classList.remove('checkout-novo__loading-modal--hidden');
        modal.style.display = 'flex';
        modal.setAttribute('aria-busy', 'true');
        setTimeout(function() {
          modal.classList.add('checkout-novo__loading-modal--hidden');
          modal.setAttribute('aria-busy', 'false');
          setTimeout(function() {
            modal.style.display = 'none';
            showStep(2);
          }, 350);
        }, 800);
      });

      document.getElementById('boleto-voltar-2').addEventListener('click', function() {
        showStep(1);
      });

      document.getElementById('boleto-continuar-2').addEventListener('click', function() {
        console.log('Boleto: gerar boleto (placeholder)');
      });

      document.getElementById('boleto-sem-numero').addEventListener('change', function() {
        var input = document.getElementById('boleto-numero');
        var checked = this.checked;
        input.disabled = checked;
        input.value = checked ? 'S/N' : '';
      });

      /* CPF/CNPJ: aceitar apenas dígitos e auto-formatação */
      function formatCPF(value) {
        var digits = value.replace(/\D/g, '').slice(0, 11);
        return digits.replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      }
      function formatCNPJ(value) {
        var digits = value.replace(/\D/g, '').slice(0, 14);
        return digits.replace(/(\d{2})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1/$2').replace(/(\d{4})(\d{1,2})$/, '$1-$2');
      }
      var docInput = document.getElementById('boleto-documento');
      var docType = document.getElementById('boleto-doc-type');
      docInput.addEventListener('input', function() {
        var v = this.value;
        this.value = docType.value === 'CNPJ' ? formatCNPJ(v) : formatCPF(v);
      });
      docType.addEventListener('change', function() {
        docInput.placeholder = this.value === 'CNPJ' ? '99.999.999/9999-99' : '999.999.999-99';
        docInput.maxLength = this.value === 'CNPJ' ? 18 : 14;
        docInput.value = docInput.value ? (this.value === 'CNPJ' ? formatCNPJ(docInput.value) : formatCPF(docInput.value)) : '';
      });

      /* CEP: aceitar apenas 8 dígitos e auto-formatação 99999-999 */
      function formatCEP(value) {
        var digits = value.replace(/\D/g, '').slice(0, 8);
        return digits.length > 5 ? digits.replace(/(\d{5})(\d)/, '$1-$2') : digits;
      }
      document.getElementById('boleto-cep').addEventListener('input', function() {
        this.value = formatCEP(this.value);
      });

    })();
  </script>
